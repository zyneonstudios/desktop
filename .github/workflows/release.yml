name: "Publish Release"

on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            os_name: "macos-arm64"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            os_name: "macos-x64"
          - platform: "ubuntu-24.04"
            target: "x86_64-unknown-linux-gnu"
            os_name: "linux-x64"
#          - platform: "ubuntu-24.04"
#            target: "aarch64-unknown-linux-gnu"
#            os_name: "linux-arm64"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            os_name: "windows-x64"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            os_name: "windows-arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf fuse
          # Zusätzliche Pakete für Linux ARM Cross-Compilation
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          fi

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Rename and Package Assets
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          OUT_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          FINAL_DIR="dist_assets"
          mkdir -p $FINAL_DIR

          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            cp "$OUT_DIR/nsis/"*.exe "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}_setup.exe"
            cd "src-tauri/target/${{ matrix.target }}/release"
            7z a "../../../../$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}_portable.zip" "zyneon-desktop.exe"
            cd ../../../..
          
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            cp "$OUT_DIR/dmg/"*.dmg "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}.dmg"
          
          else
            cp "$OUT_DIR/deb/"*.deb "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}.deb"
            cp "$OUT_DIR/rpm/"*.rpm "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}.rpm"
            cp "$OUT_DIR/appimage/"*.AppImage "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}.AppImage"
          
            cd "src-tauri/target/${{ matrix.target }}/release"
            tar -czvf "../../../../$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}_portable.tar.gz" "zyneon-desktop"
            cd ../../../..
          fi

      - name: Upload Custom Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.sha }}
          name: "v${{ steps.tauri_build.outputs.appVersion }} auto-release"
          body: "Build for commit ${{ github.sha }} <br> ${{ github.event.head_commit.message }} <br> <br> THIS RELEASE IS AUTO GENERATED AFTER A PUSH TO THE MAIN BRANCH. IT COULD BE UNSTABLE AND MAY CONTAIN BUGS. ALSO THE BINARIES ARE NOT SIGNED."
          files: dist_assets/*
          if_node_exists: replace
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}