name: "Publish Release"

on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            os_name: "macos-arm"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            os_name: "macos-x64"
          - platform: "ubuntu-24.04"
            target: "x86_64-unknown-linux-gnu"
            os_name: "linux-x64"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            os_name: "windows-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf fuse

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Rename and Package Assets
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          OUT_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          FINAL_DIR="dist_assets"
          mkdir -p $FINAL_DIR

          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            cp "$OUT_DIR/nsis/"*.exe "$FINAL_DIR/Zyneon-Desktop_$VERSION-windows-x64_setup.exe"
          
            cd "src-tauri/target/${{ matrix.target }}/release"
            7z a "../../../../$FINAL_DIR/Zyneon-Desktop_$VERSION-windows-x64_portable.zip" "zyneon-desktop.exe"
            cd ../../../..
          
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            cp "$OUT_DIR/dmg/"*.dmg "$FINAL_DIR/Zyneon-Desktop_$VERSION-${{ matrix.os_name }}.dmg"
          
          else
            cp "$OUT_DIR/deb/"*.deb "$FINAL_DIR/Zyneon-Desktop_$VERSION-linux-x64.deb"
            cp "$OUT_DIR/appimage/"*.AppImage "$FINAL_DIR/Zyneon-Desktop_$VERSION-linux-x64.AppImage"
          
            cd "src-tauri/target/${{ matrix.target }}/release"
            tar -czvf "../../../../$FINAL_DIR/Zyneon-Desktop_$VERSION-linux-x64.tar.gz" "zyneon-desktop"
            cd ../../../..
          fi

      - name: Upload Custom Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tauri_build.outputs.appVersion }}
          name: "auto-release for v${{ steps.tauri_build.outputs.appVersion }}"
          body: "Build for commit ${{ github.sha }}"
          files: dist_assets/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}